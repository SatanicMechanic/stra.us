<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Das Straus Haus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0d0d;
      --fg: #e8e2d9;
      --accent: #c9a96e;
      --muted: #555;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Josefin Sans', sans-serif;
      overflow: hidden;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.4;
    }

    /* Diagonal accent line */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 60%;
      width: 1px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, var(--accent) 30%, var(--accent) 70%, transparent);
      opacity: 0.15;
      transform: rotate(12deg) translateX(-50%);
      transform-origin: center;
    }

    .container {
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 0 8vw;
      gap: 4vw;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      opacity: 0;
      transform: translateY(20px);
      animation: reveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    .eyebrow {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 100;
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      animation: reveal 1s ease 0.6s forwards;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3rem, 6vw, 5.5rem);
      line-height: 1.0;
      letter-spacing: -0.01em;
      color: var(--fg);
    }

    h1 span {
      display: block;
      color: var(--accent);
      font-weight: 600;
      font-style: italic;
    }

    .divider {
      width: 3rem;
      height: 1px;
      background: var(--accent);
      opacity: 0.6;
    }

    .message {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      line-height: 2;
      color: #999;
      text-transform: uppercase;
      max-width: 32ch;
    }

    .right {
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      animation: reveal 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
    }

    .emblem {
      width: clamp(160px, 18vw, 260px);
      height: clamp(160px, 18vw, 260px);
      border: 1px solid rgba(201, 169, 110, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .emblem::before {
      content: '';
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(201, 169, 110, 0.1);
      border-radius: 50%;
    }

    .emblem-inner {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 5vw, 5rem);
      font-weight: 300;
      color: rgba(201, 169, 110, 0.3);
      letter-spacing: -0.05em;
      user-select: none;
    }

    .footer {
      position: fixed;
      bottom: 2.5rem;
      left: 8vw;
      right: 8vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: reveal 1s ease 1s forwards;
    }

    .footer-text {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @keyframes reveal {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      body { overflow: auto; }
      .container {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
        padding: 4rem 2rem 8rem;
        gap: 3rem;
      }
      .right { order: -1; }
      .emblem {
        width: 120px;
        height: 120px;
      }
      body::after { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <div class="eyebrow">Est. &mdash; Private Residence</div>
      <h1>Das<br>Straus<br><span>Haus</span></h1>
      <div class="divider"></div>
      <p class="message">As you can see, there&rsquo;s nobody home at the moment.<br>This domain is used for email.</p>
    </div>
    <div class="right">
      <div class="emblem">
        <div class="emblem-inner">S</div>
      </div>
    </div>
  </div>
  <div class="footer">
    <span class="footer-text">stra.us</span>
    <span class="footer-text">&mdash;</span>
    <span class="footer-text">Private</span>
  </div>
</body>
</html>
